name: Release

# Push a version tag (e.g. v1.0.0) to build the exe and attach it to a GitHub Release.
# Can also be run manually (Actions tab -> Release -> Run workflow) to produce a downloadable artifact.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET (10 for the app, 6 for the D2SLib library)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            10.0.x

      # The app references D2SLib as a prebuilt net6.0 DLL, so build it first.
      - name: Build D2SLib (Release, net6.0)
        run: dotnet build D2SLib-D2R/src/D2SLib.csproj -c Release -f net6.0

      # Self-contained, compressed, single-file Windows exe with the data tables bundled in.
      - name: Publish single-file exe
        run: >
          dotnet publish D2RItemInspector.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeAllContentForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Upload build artifact (for manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: D2RItemInspector-win-x64
          path: publish/D2RItemInspector.exe

      # Pull this tag's section out of CHANGELOG.md to use as the Release description.
      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          awk -v tag="${GITHUB_REF_NAME}" '
            $0 ~ ("^## " tag "([ ]|$)") {f=1; next}
            f && /^## / {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG.md section found for ${GITHUB_REF_NAME}. See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Attach exe + license notices to the GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/D2RItemInspector.exe
            LICENSE
            THIRD-PARTY-NOTICES.md
          body_path: RELEASE_NOTES.md
